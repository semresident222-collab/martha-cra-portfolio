<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaVoxa CRA Portfolio — Door 2: KEYNOTE-991</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1520;
      color: #e8ddd0;
      font-family: 'Georgia', serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #video-stage {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #video-stage iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #ui-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
    }

    .door-header,
    .door-footer {
      opacity: 0;
      transition: opacity 1s ease;
    }

    .visible {
      opacity: 1;
    }

    .door-header h1 {
      font-size: 11px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(232,221,208,0.4);
    }

    .door-header h2 {
      font-size: 28px;
      letter-spacing: 4px;
      margin-top: 8px;
    }

    .door-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .pdf-access,
    .door-nav {
      pointer-events: auto;
    }

    .pdf-access a,
    .door-nav a {
      color: rgba(232,221,208,0.35);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.6s ease;
    }

    .pdf-access a:hover,
    .door-nav a:hover {
      color: #e8ddd0;
    }

    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #b87b4f;
      width: 0%;
      z-index: 20;
    }

    #timer {
      position: fixed;
      bottom: 6px;
      left: 24px;
      font-size: 10px;
      color: rgba(232,221,208,0.2);
      font-family: monospace;
      z-index: 20;
    }

    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,21,32,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }

    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #start-overlay h2 {
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>

  <!-- VIDEO -->
  <div id="video-stage">
    <iframe 
      id="vimeo-player"
      src="https://player.vimeo.com/video/1200536405?title=0&byline=0&portrait=0&autoplay=0&muted=1"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <!-- UI -->
  <div id="ui-layer">
    <div class="door-header" id="door-header">
      <h1>Door 02</h1>
      <h2>KEYNOTE-991</h2>
    </div>

    <div class="door-footer" id="door-footer">
      <div class="pdf-access">
        <a href="assets/door-2/keynote-991-protocol.pdf" target="_blank">View Protocol PDF</a>
      </div>
      <div class="door-nav">
        <a href="door-3.html">Next Door →</a>
      </div>
    </div>
  </div>

  <div id="progress-bar"></div>
  <div id="timer">00:00 / 03:30</div>

  <!-- START OVERLAY -->
  <div id="start-overlay" onclick="startPresentation()">
    <h2>Click to Begin</h2>
    <p>Full-screen video with narration</p>
  </div>

  <script>
    const TOTAL_DURATION = 210;
    let elapsed = 0;
    let isPlaying = false;

    const player = document.getElementById('vimeo-player');
    const progressBar = document.getElementById('progress-bar');
    const timer = document.getElementById('timer');
    const doorHeader = document.getElementById('door-header');
    const doorFooter = document.getElementById('door-footer');
    const startOverlay = document.getElementById('start-overlay');

    function startPresentation() {
      startOverlay.classList.add('hidden');

      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      }

      setTimeout(() => {
        doorHeader.classList.add('visible');
        doorFooter.classList.add('visible');
      }, 500);

      // 🔥 START VIDEO
      player.src = player.src.replace('autoplay=0', 'autoplay=1');

      isPlaying = true;
      animate();
    }

    function animate() {
      if (!isPlaying) return;

      elapsed += 0.1;

      if (elapsed > TOTAL_DURATION) {
        elapsed = TOTAL_DURATION;
        isPlaying = false;
      }

      progressBar.style.width = (elapsed / TOTAL_DURATION) * 100 + '%';

      const mins = Math.floor(elapsed / 60);
      const secs = Math.floor(elapsed % 60);

      timer.textContent = 
        `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')} / 03:30`;

      if (elapsed > 10) {
        doorHeader.classList.remove('visible');
      }

      requestAnimationFrame(animate);
    }
  </script>

</body>
</html>
